# Configuración específica del módulo Identity & Access
# File: src/main/resources/application-identity.properties

# Configuración de usuarios
identity.user.password-min-length=8
identity.user.max-login-attempts=5
identity.user.lockout-duration-minutes=15

# Configuración de roles
identity.role.max-roles-per-user=10

# Configuración de sesiones
identity.session.timeout-minutes=30
identity.session.remember-me-duration-days=7

# Configuración de tokens
identity.token.jwt-secret=your-secret-key-change-in-production
identity.token.jwt-expiration-hours=24
identity.token.refresh-token-expiration-days=7

# Configuración de auditoría
identity.audit.enabled=true
identity.audit.log-user-logins=true
identity.audit.log-role-changes=true

